<!DOCTYPE html>
<html>
<head>
  <title>Arman Store</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f1e8;
    }

    header {
      background: #3e2b1f;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      background: #d9cfc3;
      padding: 10px;
      height: 100vh;
      position: fixed;
      overflow-y: auto;
    }

    .sidebar button {
      width: 100%;
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: white;
    }

    /* PRODUCTS */
    .products {
      margin-left: 220px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      padding: 15px;
    }

    .product {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .product img {
      width: 100%;
      height: 120px;
      object-fit: contain;
    }

    button {
      margin-top: 5px;
      padding: 5px 10px;
      border: none;
      background: #3e2b1f;
      color: white;
      border-radius: 5px;
    }

    /* 🛒 FULL SCREEN CART */
    .cart-box {
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 2000;
      transition: 0.3s ease;
      overflow-y: auto;
      padding: 15px;
    }

    .cart-box.active {
      right: 0;
    }

    /* 📱 MOBILE FIX */
    @media (max-width: 768px) {

      .sidebar {
        display: none; /* hide sidebar */
      }

      .products {
        margin-left: 0;
        grid-template-columns: repeat(2, 1fr);
        padding: 10px;
      }

      body {
        overflow-x: hidden;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div>ARMAN STORE</div>
    <button onclick="openCart()">Cart</button>
  </header>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button>Tissues</button>
    <button>Toilet Roll</button>
    <button>Kitchen Roll</button>
    <button>Mop</button>
    <button>Wiper</button>
    <button>Broom</button>
    <button>Room Freshner</button>
    <button>Handwash</button>
    <button>Floor Cleaner</button>
    <button>Cleaning Cloth</button>
    <button>Glass</button>
    <button>Toilet Cleaner</button>
    <button>Dishwash</button>
    <button>Cleaning Spray</button>
    <button>Wipes</button>
    <button>Foil Products</button>
    <button>Garbage Bag</button>
    <button>Liquid</button>
  </div>

  <!-- PRODUCTS -->
  <div class="products" id="products"></div>

  <!-- CART -->
  <div class="cart-box" id="cart">
    <button onclick="closeCart()">⬅ Back</button>
    <h2>Cart</h2>
    <div id="cart-items"></div>
  </div>

  <script>
    let cart = [];

    // FETCH PRODUCTS
    fetch('/products')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("products");

        data.forEach(product => {
          container.innerHTML += `
            <div class="product">
              <img src="${product.image}">
              <h4>${product.name}</h4>
              <p>₹${product.price}</p>
              <button onclick='addToCart(${JSON.stringify(product)})'>Add</button>
            </div>
          `;
        });
      });

    function addToCart(product) {
      cart.push(product);
      renderCart();
    }

    function renderCart() {
      const cartDiv = document.getElementById("cart-items");
      cartDiv.innerHTML = "";

      cart.forEach(item => {
        cartDiv.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
      });
    }

    function openCart() {
      document.getElementById("cart").classList.add("active");
    }

    function closeCart() {
      document.getElementById("cart").classList.remove("active");
    }
  </script>

</body>
</html>
