<!DOCTYPE html>
<html>
<head>
  <title>Arman Store</title>

  <!-- MOBILE FIX -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f1e8;
    }

    header {
      background: #3e2b1f;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      padding: 15px;
    }

    .product {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .product img {
      width: 100%;
      height: 120px;
      object-fit: contain;
    }

    /* 📱 MOBILE GRID FIX */
    @media (max-width: 768px) {
      .products {
        grid-template-columns: repeat(2, 1fr);
        padding: 10px;
      }
    }

    /* 🛒 SLIDING CART */
    .cart-box {
      position: fixed;
      top: 0;
      right: -100%;
      width: 80%;
      height: 100%;
      background: white;
      z-index: 1000;
      transition: 0.3s ease;
      overflow-y: auto;
      box-shadow: -2px 0 10px rgba(0,0,0,0.2);
      padding: 10px;
    }

    .cart-box.active {
      right: 0;
    }

    .cart-btn {
      background: white;
      color: black;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    button {
      margin-top: 5px;
      padding: 5px 10px;
      border: none;
      background: #3e2b1f;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div>ARMAN STORE</div>
    <div>
      <button class="cart-btn" onclick="openCart()">Cart</button>
    </div>
  </header>

  <!-- PRODUCTS -->
  <div class="products" id="products"></div>

  <!-- CART -->
  <div class="cart-box" id="cart">
    <button onclick="closeCart()">⬅ Back</button>
    <h3>Your Cart</h3>
    <div id="cart-items"></div>
  </div>

  <script>
    let cart = [];

    // FETCH PRODUCTS FROM BACKEND
    fetch('/products')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("products");

        data.forEach(product => {
          container.innerHTML += `
            <div class="product">
              <img src="${product.image}">
              <h4>${product.name}</h4>
              <p>₹${product.price}</p>
              <button onclick='addToCart(${JSON.stringify(product)})'>Add</button>
            </div>
          `;
        });
      });

    function addToCart(product) {
      cart.push(product);
      renderCart();
    }

    function renderCart() {
      const cartDiv = document.getElementById("cart-items");
      cartDiv.innerHTML = "";

      cart.forEach(item => {
        cartDiv.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
      });
    }

    function openCart() {
      document.getElementById("cart").classList.add("active");
    }

    function closeCart() {
      document.getElementById("cart").classList.remove("active");
    }
  </script>

</body>
</html>
