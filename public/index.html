<!DOCTYPE html>
<html>
<head>
<title>Arman Store</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f1e8;
}

header{
  background:#3e2b1f;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-circle{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#d4a373;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container{
  display:flex;
}

.sidebar{
  width:20%;
  background:#e8dccb;
  padding:10px;
  height:100vh;
  overflow:auto;
}

.category-btn{
  background:white;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  cursor:pointer;
  text-align:center;
}

.main{
  width:80%;
  padding:10px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap:10px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

button{
  background:#3e2b1f;
  color:white;
  border:none;
  padding:8px;
  width:100%;
  cursor:pointer;
}

.qty{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}

.cart-box{
  position:fixed;
  top:0;
  right:-400px;
  width:300px;
  height:100%;
  background:white;
  padding:15px;
  transition:0.3s;
}

.whatsapp-btn{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:green;
  color:white;
  padding:12px;
  text-align:center;
}

/* ✅ MOBILE FIX */
@media (max-width:768px){

  .container{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    display:flex;
    overflow-x:auto;
    gap:10px;
    height:auto;
  }

  .category-btn{
    min-width:120px;
    flex-shrink:0;
  }

  .main{
    width:100%;
    grid-template-columns:repeat(2,1fr);
  }

  header{
    flex-direction:column;
    text-align:center;
  }
}
</style>

</head>

<body>

<header>
  <div class="logo">
    <div class="logo-circle">AS</div>
    <div>ARMAN STORE</div>
  </div>

  <div>
    <button onclick="location.reload()">Home</button>
  </div>
</header>

<div style="text-align:center; padding:10px;">
  <h2>Welcome to Arman Store</h2>
  <p>Your one-stop shop for daily essentials</p>
  <p><b>📍 Mumbai, India</b></p>
  <p><b>📞 7304578176</b></p>
</div>

<div class="container">

  <div class="sidebar" id="categories"></div>

  <div class="main" id="products"></div>

</div>

<div class="whatsapp-btn" onclick="orderWhatsApp()">
  Order on WhatsApp
</div>

<script>
let cart=[];

fetch('/products')
.then(res=>res.json())
.then(data=>{
  showProducts(data);
  showCategories(data);
});

function showProducts(data){
  let html='';
  data.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.image||''}">
      <h4>${p.name}</h4>
      <p>₹${p.price}</p>
      <div class="qty">
        <button onclick="addToCart('${p.name}',${p.price})">Add</button>
      </div>
    </div>
    `;
  });
  document.getElementById('products').innerHTML=html;
}

function showCategories(data){
  let cats=[...new Set(data.map(p=>p.category))];
  let html='';
  cats.forEach(c=>{
    html+=`<div class="category-btn" onclick="filterCat('${c}')">${c}</div>`;
  });
  document.getElementById('categories').innerHTML=html;
}

function filterCat(cat){
  fetch('/products')
  .then(res=>res.json())
  .then(data=>{
    let filtered=data.filter(p=>p.category===cat);
    showProducts(filtered);
  });
}

function addToCart(name,price){
  cart.push({name,price});
}

function orderWhatsApp(){
  let text="Order:%0A";
  cart.forEach(i=>{
    text+=`${i.name} - ₹${i.price}%0A`;
  });

  window.open(`https://wa.me/917304578176?text=${text}`);
}
</script>

</body>
</html>
