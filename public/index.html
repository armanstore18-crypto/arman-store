<!DOCTYPE html>
<html>
<head>
  <title>Arman Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f1e8;
}

/* LOCK SCROLL WHEN CART OPEN */
body.cart-open {
  overflow: hidden;
}

header {
  background: #3e2b1f;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
}

/* PRODUCTS GRID */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  padding: 10px;
}

.product {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.product img {
  width: 100%;
  height: 120px;
  object-fit: contain;
}

/* CART */
.cart {
  position: fixed;
  top: 0;
  right: -100%;
  width: 300px;
  height: 100%;
  background: white;
  transition: 0.3s;
  z-index: 3000;
  padding: 15px;
  overflow-y: auto;
}

.cart.active {
  right: 0;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  z-index: 2000;
}

.overlay.active {
  display: block;
}

/* MOBILE FIX */
@media (max-width: 768px) {
  .products {
    grid-template-columns: repeat(2, 1fr);
  }

  .cart {
    width: 85%;
  }
}
  </style>
</head>

<body>

<header>
  <h3>ARMAN STORE</h3>
  <button onclick="openCart()">🛒 Cart</button>
</header>

<div class="products" id="products"></div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart" id="cart">
  <button onclick="closeCart()" style="float:right;">✖</button>
  <h2>Cart</h2>
  <div id="cart-items"></div>
  <button onclick="sendWhatsApp()">Place Order on WhatsApp</button>
</div>

<script>
let cart = [];

fetch('/products')
.then(res => res.json())
.then(data => {
  const container = document.getElementById("products");

  data.forEach(product => {
    container.innerHTML += `
      <div class="product">
        <img src="${product.image || 'https://via.placeholder.com/150'}">
        <h4>${product.name}</h4>
        <p>₹${product.price}</p>
        <button onclick='addToCart(${JSON.stringify(product)})'>Add</button>
      </div>
    `;
  });
});

function addToCart(p){
  cart.push(p);
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach(item => {
    total += item.price;
    html += `<p>${item.name} - ₹${item.price}</p>`;
  });

  html += `<h3>Total: ₹${total}</h3>`;
  document.getElementById("cart-items").innerHTML = html;
}

function openCart(){
  document.getElementById("cart").classList.add("active");
  document.getElementById("overlay").classList.add("active");
  document.body.classList.add("cart-open");
}

function closeCart(){
  document.getElementById("cart").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
  document.body.classList.remove("cart-open");
}

function sendWhatsApp(){
  let message = "🛒 *New Order*\n\n";
  let total = 0;

  cart.forEach(item => {
    message += `${item.name} - ₹${item.price}\n`;
    total += item.price;
  });

  message += `\n*Total: ₹${total}*`;

  const phone = "917304578176"; // 👉 PUT YOUR NUMBER HERE
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
}
</script>

</body>
</html>
